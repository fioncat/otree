[package]
name = "otree"
version = "0.2.0"
edition = "2021"
build = "build.rs"
license = "MIT"
authors = ["fioncat"]
categories = ["command-line-utilities"]
readme = "README.md"
repository = "https://github.com/fioncat/otree"
description = "A command line tool to view objects (json/yaml/toml) in TUI tree widget"

[dependencies]
ansi-to-tui = { git = "https://github.com/uttarayan21/ansi-to-tui.git", rev = "90cb669d58c8c4e535f2eac356f3e7c53a69b8cb" }
anyhow = "1.0.86"
clap = { version = "4.5.9", features = ["derive"] }
crossterm = "0.27.0"
dirs = "5.0.1"
humansize = "2.1.3"
once_cell = "1.19.0"
paste = "1.0.15"
ratatui = { version = "0.27.0", features = ["unstable-widget-ref"] }
regex = "1.10.5"
serde = { version = "1.0.204", features = ["derive"] }
serde_json = { version = "1.0.120", features = ["preserve_order"] }
serde_yml = "0.0.10"
syntect = { version = "5.2.0", default-features = false, features = ["default-fancy"] }
toml = { version = "0.8.14", features = ["preserve_order"] }
tui-tree-widget = "0.21.0"

[build-dependencies]
simple-error = "0.3.0"
vergen = { version = "9.0.0", features = ["build", "rustc", "cargo", "si"] }

[profile.release]
lto = true
strip = true
incremental = false
